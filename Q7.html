<!DOCTYPE html>
<html>
<head>
  <title>Language Converter</title>
</head>

<body style="text-align:center; font-family:Arial;">

  <h2>Text / Speech Converter</h2>

  <textarea id="inputText" rows="4" cols="40" placeholder="Enter text..."></textarea>
  <br><br>

  <select id="targetLang">
    <option value="hi">Hindi</option>
    <option value="en">English</option>
    <option value="fr">French</option>
    <option value="es">Spanish</option>
  </select>

  <br><br>

  <button onclick="convertText()">Convert</button>
  <button onclick="startSpeech()">Speak</button>
  <button onclick="speakOutput()">Speak Output</button>

  <h3 id="output"></h3>

  <script>
    async function convertText() {
      let text = document.getElementById("inputText").value;
      let target = document.getElementById("targetLang").value;

      let url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=en|${target}`;

      try {
        let res = await fetch(url);
        let data = await res.json();

        document.getElementById("output").innerText =
          data.responseData.translatedText;
      } catch (err) {
      }
    }

    // Speech Recognition (Chrome only)
    function startSpeech() {
      if (!('webkitSpeechRecognition' in window)) {
        return;
      }

      let recognition = new webkitSpeechRecognition();
      recognition.lang = "en-US";

      recognition.onresult = function(event) {
        document.getElementById("inputText").value =
          event.results[0][0].transcript;
      };

      recognition.start();
    }

    function speakOutput() {
      let text = document.getElementById("output").innerText;
      let lang = document.getElementById("targetLang").value;

      let speech = new SpeechSynthesisUtterance(text);
      speech.lang = lang;

      speechSynthesis.speak(speech);
    }
  </script>

</body>
</html>
