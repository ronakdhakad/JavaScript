<SCRIPT>
let num1=parseInt(prompt("enter 1st number"));
let num2=parseInt(prompt("enter 2nd number"));
class Demo{

    
    A(a,b){
        this.a=a;
        this.b=b;
        document.write("<br>before swapping");
        document.write("<br>a: "+this.a+" b: "+this.b);
    }
    swap(){
        this.a=this.a+this.b;
        this.b=this.a-this.b;
        this.a=this.a-this.b;
    }


    display(){
        document.write("<br>after swapping");
        document.write("<br>a: "+this.a+" b: "+this.b);
    }
}
const obj =new Demo();
obj.A(num1,num2);
obj.swap();
obj.display();
</SCRIPT>
